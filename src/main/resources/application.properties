spring.application.name=identity-service

# ── Default Profile ────────────────────────────────────────────────────────────
# 'prod' is the default — deploying to any platform without extra config runs production settings.
# To run locally: add VM option  -Dspring.profiles.active=local
#                 or Maven flag  -Dspring-boot.run.profiles=local
spring.profiles.default=prod

# ── JPA Platform (shared across all profiles) ──────────────────────────────────
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.default_schema=identity

# ── JWT (shared across all profiles) ──────────────────────────────────────────
# Base64-encoded 256-bit secret key
jwt.secret=aWRlbnRpdHktc2VydmljZS1zZWNyZXQta2V5LTMyYnl0ZQ==
jwt.access-token-expiry-ms=900000
jwt.refresh-token-expiry-ms=604800000

# ── Swagger / OpenAPI (shared across all profiles) ────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.default-produces-media-type=application/json
springdoc.remove-broken-reference-definitions=false
