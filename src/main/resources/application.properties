# ── Swagger / OpenAPI ─────────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
# Ignore security-injected params so SpringDoc doesn't crash on @AuthenticationPrincipal
springdoc.default-produces-media-type=application/json
springdoc.remove-broken-reference-definitions=false

# ── Refresh-Token Cookie ──────────────────────────────────────────────────────
# COOKIE_SECURE   → false for local HTTP dev, true for production HTTPS (set in Railway env vars)
# COOKIE_SAME_SITE→ Strict (default, most secure) | Lax | None (cross-origin SPA, requires Secure=true)
app.cookie.secure=${COOKIE_SECURE:false}
app.cookie.same-site=${COOKIE_SAME_SITE:Strict}

