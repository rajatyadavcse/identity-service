# =============================================================================
#  PRODUCTION PROFILE  (active by default on any deployment platform)
# =============================================================================
#
#  No environment variables need to be set in Railway / Render / Heroku / Fly.io.
#  The only platform-injected variable used is PORT — which ALL platforms set
#  automatically as part of their deployment process (nothing to configure in UI).
#
#  ⚠️  IMPORTANT: Before deploying, update the two values marked [UPDATE]:
#      1.  app.base-url       — your actual deployed API URL
#      2.  cors.allowed-origins — your actual React frontend URL
# =============================================================================

# ── Server ────────────────────────────────────────────────────────────────────
# PORT is injected automatically by every major cloud platform (Railway, Render,
# Heroku, Fly.io). You never set this manually — the platform does it.
server.port=${PORT:8080}

# Required to correctly detect HTTPS and the real client IP behind the
# platform's reverse proxy / load balancer.
server.forward-headers-strategy=native

# ── Datasource ────────────────────────────────────────────────────────────────
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres?sslmode=require&currentSchema=identity
spring.datasource.username=postgres.iglezaprcevbzjldkutb
spring.datasource.password=MLshZRv51jdYvLhF

# Hikari pool — tuned for a cloud-hosted/serverless DB (Supabase pgBouncer)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# 'update' keeps the schema in sync with entity changes on each deploy.
# Switch to 'validate' once the schema is stable to prevent accidental changes.
spring.jpa.hibernate.ddl-auto=update

# ── Application Base URL ──────────────────────────────────────────────────────
# [UPDATE] Replace with your actual deployed API URL.
# Used by Swagger UI as the default server for "Try it out" calls.
app.base-url=/

# ── CORS ──────────────────────────────────────────────────────────────────────
# [UPDATE] Replace with your actual React frontend URL.
# Must be an exact origin (not *) so the browser accepts the HttpOnly cookie.
# Multiple origins: cors.allowed-origins=https://app.example.com,https://admin.example.com
cors.allowed-origins=*

# ── Refresh-Token Cookie ──────────────────────────────────────────────────────
# Secure=true  — cookie only sent over HTTPS (all cloud platforms use HTTPS)
# SameSite=None — required for a React frontend hosted on a different domain.
#                 Works because Secure=true satisfies the browser requirement.
app.cookie.secure=true
app.cookie.same-site=None
